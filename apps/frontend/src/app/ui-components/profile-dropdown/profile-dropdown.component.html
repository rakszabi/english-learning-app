<div class="pd">
  <button
    class="pd__trigger"
    (click)="toggle()"
    [attr.aria-expanded]="isOpen()"
    aria-haspopup="true"
    type="button"
  >
    <app-avatar [name]="userDisplayName() || userEmail()" size="sm" />
    <span class="pd__name">{{ userDisplayName() }}</span>
    <svg
      class="pd__chevron"
      [class.pd__chevron--open]="isOpen()"
      width="14"
      height="14"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>

  @if (isOpen()) {
    <div class="pd__menu" role="menu">
      <div class="pd__email">{{ userEmail() }}</div>
      <div class="pd__divider"></div>

      <a
        routerLink="/profile"
        class="pd__item"
        role="menuitem"
        (click)="isOpen.set(false)"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Profile
      </a>

      <div class="pd__divider"></div>

      <button
        class="pd__item pd__item--danger"
        role="menuitem"
        type="button"
        (click)="logout()"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sign out
      </button>
    </div>
  }
</div>
