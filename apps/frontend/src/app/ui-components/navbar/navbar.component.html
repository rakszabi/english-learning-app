<header class="navbar">
  <div class="navbar__left">
    <a routerLink="/dashboard" class="navbar__brand" aria-label="English Learning App – home">
      <span class="navbar__logo-mark">ELA</span>
      <span class="navbar__brand-name">English Learning</span>
    </a>

    <nav class="navbar__links" aria-label="Main navigation">
      <a
        routerLink="/dashboard"
        routerLinkActive="navbar__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="navbar__link"
      >
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>
      <a
        routerLink="/dialogues"
        routerLinkActive="navbar__link--active"
        class="navbar__link"
      >
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Dialogues
      </a>
      <a
        routerLink="/practice"
        routerLinkActive="navbar__link--active"
        class="navbar__link"
      >
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        Practice
      </a>
    </nav>
  </div>

  <div class="navbar__right">
    <app-profile-dropdown />

    <button
      class="navbar__hamburger"
      type="button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen()"
      aria-label="Open navigation menu"
    >
      @if (isMenuOpen()) {
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      } @else {
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="7" x2="21" y2="7"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="17" x2="21" y2="17"/>
        </svg>
      }
    </button>
  </div>
</header>

<!-- Overlay -->
<div
  class="navbar__overlay"
  [class.navbar__overlay--visible]="isMenuOpen()"
  (click)="closeMenu()"
  aria-hidden="true"
></div>

<!-- Mobile drawer -->
<aside
  class="navbar__drawer"
  [class.navbar__drawer--open]="isMenuOpen()"
  [attr.aria-hidden]="!isMenuOpen()"
>
  <div class="navbar__drawer-header">
    <a routerLink="/dashboard" class="navbar__drawer-brand" (click)="closeMenu()">
      <span class="navbar__drawer-logo">ELA</span>
      <span class="navbar__drawer-brand-name">English Learning</span>
    </a>
    <button
      class="navbar__drawer-close"
      type="button"
      (click)="closeMenu()"
      aria-label="Close menu"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <nav class="navbar__drawer-links" aria-label="Mobile navigation">
    <a
      routerLink="/dashboard"
      routerLinkActive="navbar__drawer-link--active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="navbar__drawer-link"
    >
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      Dashboard
    </a>
    <a
      routerLink="/dialogues"
      routerLinkActive="navbar__drawer-link--active"
      class="navbar__drawer-link"
    >
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      Dialogues
    </a>
    <a
      routerLink="/practice"
      routerLinkActive="navbar__drawer-link--active"
      class="navbar__drawer-link"
      (click)="closeMenu()"
    >
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      Practice
    </a>
  </nav>

  <div class="navbar__drawer-spacer"></div>

  <div class="navbar__drawer-divider"></div>

  <div class="navbar__drawer-user">
    <div class="navbar__drawer-avatar">{{ userInitial() }}</div>
    <span class="navbar__drawer-email">{{ userEmail() }}</span>
  </div>

  <div class="navbar__drawer-actions">
    <a
      routerLink="/profile"
      class="navbar__drawer-action"
      (click)="closeMenu()"
    >
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Profile
    </a>
    <button
      class="navbar__drawer-action navbar__drawer-action--danger"
      type="button"
      (click)="logout()"
    >
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sign out
    </button>
  </div>
</aside>
